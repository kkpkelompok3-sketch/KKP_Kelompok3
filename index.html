<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaduan Online</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0f172a;color:#fff}
.container{max-width:900px;margin:40px auto;padding:20px}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h2{text-align:center;margin-bottom:20px}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

/* tombol modern */
button{
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  margin-top:12px;
  width:100%;
  transition: all 0.3s ease;
}

.kirim{
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color:#fff;
}

.login{
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color:#fff;
}

.logout{
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color:#fff;
}

.hapus{
  background:#ef4444;
  color:#fff;
  width:auto;
  padding:5px 10px;
}

/* animasi */
button:hover{
  transform: translateY(-2px);
}

.hidden{display:none}

/* tabel */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:left;
}

th{
  background:#334155;
}

tr{
  border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<div class="container">

<!-- USER -->
<div class="card" id="userPage">
<h2>📢 Pengaduan Masyarakat</h2>

<input id="nama" placeholder="Nama">
<input id="nik" placeholder="NIK">
<input id="alamat" placeholder="Alamat Rumah">
<textarea id="saran" placeholder="Tulis saran..."></textarea>

<button class="kirim" onclick="kirim()">Kirim</button>
<button class="login" onclick="showAdmin()">Login Admin</button>
</div>

<!-- LOGIN -->
<div class="card hidden" id="loginPage">
<h2>🔐 Login Admin</h2>
<input type="password" id="password" placeholder="Password">
<button class="login" onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPage">
<h2>📊 Data Pengaduan</h2>
<button class="logout" onclick="logout()">Logout</button>
<table id="tabel"></table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

// 🔥 CONFIG KAMU (SUDAH AKU PASANGKAN)
const firebaseConfig = {
  apiKey: "AIzaSyBQ68cEzptQqW_hh-9qRKujiyG8rZKw-_Y",
  authDomain: "kkp-kelompok-3.firebaseapp.com",
  projectId: "kkp-kelompok-3",
  storageBucket: "kkp-kelompok-3.firebasestorage.app",
  messagingSenderId: "184562883868",
  appId: "1:184562883868:web:6b418aa5d1dc6aa9edaed9",
  measurementId: "G-L66XJTQPZ3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASS = "admin123";

// KIRIM DATA
window.kirim = async function(){
  let nama = document.getElementById("nama").value;
  let nik = document.getElementById("nik").value;
  let alamat = document.getElementById("alamat").value;
  let saran = document.getElementById("saran").value;

  if(!nama || !nik || !alamat || !saran){
    alert("Isi semua!");
    return;
  }

  await addDoc(collection(db, "pengaduan"), {
    nama, nik, alamat, saran,
    waktu: new Date().toLocaleString()
  });

  alert("Berhasil dikirim!");

  document.getElementById("nama").value="";
  document.getElementById("nik").value="";
  document.getElementById("alamat").value="";
  document.getElementById("saran").value="";
};

// ADMIN LOGIN
window.showAdmin = function(){
  userPage.classList.add("hidden");
  loginPage.classList.remove("hidden");
};

window.login = function(){
  if(password.value === ADMIN_PASS){
    loginPage.classList.add("hidden");
    adminPage.classList.remove("hidden");
    loadData();
  }else{
    alert("Password salah!");
  }
};

window.logout = function(){
  adminPage.classList.add("hidden");
  userPage.classList.remove("hidden");
};

// LOAD DATA REALTIME
function loadData(){
  onSnapshot(collection(db,"pengaduan"), snapshot=>{
    let tabel = document.getElementById("tabel");

    tabel.innerHTML = `
    <tr>
      <th>Nama</th>
      <th>NIK</th>
      <th>Alamat</th>
      <th>Saran</th>
      <th>Waktu</th>
      <th>Aksi</th>
    </tr>`;

    snapshot.forEach(docu=>{
      let d = docu.data();

      tabel.innerHTML += `
      <tr>
        <td>${d.nama}</td>
        <td>${d.nik}</td>
        <td>${d.alamat}</td>
        <td>${d.saran}</td>
        <td>${d.waktu}</td>
        <td><button class="hapus" onclick="hapus('${docu.id}')">Hapus</button></td>
      </tr>`;
    });
  });
}

// HAPUS DATA
window.hapus = async function(id){
  await deleteDoc(doc(db,"pengaduan",id));
};
</script>

</body>
</html>
