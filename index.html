<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pengaduan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0f172a;color:#fff}
.container{max-width:900px;margin:40px auto;padding:20px}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h2{text-align:center;margin-bottom:20px}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

/* tombol modern */
button{
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  margin-top:12px;
  width:100%;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.kirim{
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color:#fff;
}

.login{
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color:#fff;
}

.logout{
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color:#fff;
  margin-bottom:10px;
}

.hapus{
  background:#ef4444;
  color:#fff;
  width:auto;
  padding:6px 10px;
}

/* animasi */
button:hover{
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.3);
}

button:active{
  transform: scale(0.97);
}

/* tabel */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:left;
}

th{
  background:#334155;
}

tr{
  border-bottom:1px solid #334155;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<!-- USER -->
<div class="card" id="userPage">
<h2>📢 Pengaduan Masyarakat</h2>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nik" placeholder="NIK">
<input type="text" id="alamat" placeholder="Alamat Rumah">
<textarea id="saran" placeholder="Tulis saran..."></textarea>

<button class="kirim" onclick="kirim()">Kirim</button>
<button class="login" onclick="showAdmin()">Login Admin</button>
</div>

<!-- LOGIN -->
<div class="card hidden" id="loginPage">
<h2>🔐 Login Admin</h2>
<input type="password" id="password" placeholder="Password Admin">
<button class="login" onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminPage">
<h2>📊 Data Pengaduan</h2>
<button class="logout" onclick="logout()">Logout</button>
<table id="tabel"></table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("pengaduan")) || [];
const ADMIN_PASS = "KKP123"; // ubah password di sini

function simpan(){
  localStorage.setItem("pengaduan", JSON.stringify(data));
}

function kirim(){
  let nama = document.getElementById("nama").value;
  let nik = document.getElementById("nik").value;
  let alamat = document.getElementById("alamat").value;
  let saran = document.getElementById("saran").value;

  if(!nama || !nik || !alamat || !saran){
    alert("Semua harus diisi!");
    return;
  }

  data.push({
    nama, nik, alamat, saran,
    waktu: new Date().toLocaleString()
  });

  simpan();

  document.getElementById("nama").value="";
  document.getElementById("nik").value="";
  document.getElementById("alamat").value="";
  document.getElementById("saran").value="";

  alert("Pengaduan berhasil dikirim!");
}

function showAdmin(){
  document.getElementById("userPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function login(){
  let pass = document.getElementById("password").value;

  if(pass === ADMIN_PASS){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("adminPage").classList.remove("hidden");
    render();
  }else{
    alert("Password salah!");
  }
}

function logout(){
  document.getElementById("adminPage").classList.add("hidden");
  document.getElementById("userPage").classList.remove("hidden");
}

function hapus(index){
  if(confirm("Yakin hapus data?")){
    data.splice(index,1);
    simpan();
    render();
  }
}

function render(){
  let tabel = document.getElementById("tabel");

  tabel.innerHTML = `
  <tr>
    <th>Nama</th>
    <th>NIK</th>
    <th>Alamat</th>
    <th>Saran</th>
    <th>Waktu</th>
    <th>Aksi</th>
  </tr>`;

  data.forEach((d,i)=>{
    tabel.innerHTML += `
    <tr>
      <td>${d.nama}</td>
      <td>${d.nik}</td>
      <td>${d.alamat}</td>
      <td>${d.saran}</td>
      <td>${d.waktu}</td>
      <td><button class="hapus" onclick="hapus(${i})">Hapus</button></td>
    </tr>`;
  });
}
</script>

</body>
</html>
